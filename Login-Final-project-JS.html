<html>
    <head>
        <title>Login | Abidin Tech International</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
        <style>
            body{
                background:linear-gradient(#0f2027, #203a43, #2c5364);
                min-height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
                color: white;
            }
            .login-card{
                background-color: rgba(255, 255, 255, 0.1);
                border-radius: 20px;
                padding: 30px;
                width: 100%;
                max-width: 400px;
                box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            }
        </style>
    </head>
    <body>
        <div class="login-card text-center">
        <h3>Abidin Tech International</h3>
        <input type="text" id="username" class="form-control mb-3" placeholder="Username">
        <input type="password" id="password" class="form-control mb-3" placeholder="Password">
        <button class="btn btn-primary w-100" onclick="login()">Login</button>
        <p id="loginError" class="text-danger mt-3"></p>
        </div>
        <script>
            localStorage.setItem("username","diego");
            localStorage.setItem("password","12345");

            function login(){
                let inputusername = document.getElementById("username").value;
                let inputpassword = document.getElementById("password").value;

                let savedusername = localStorage.getItem("username");
                let savedpassword = localStorage.getItem("password");

                if (inputusername === savedusername && inputpassword === savedpassword){
                    window.location.href = "dashboard-Final-project-JS.html";
                }
                else{
                    document.getElementById("loginError").innerText = "Username or Password is incorrect!";
                }
            }
        </script>
    </body>
